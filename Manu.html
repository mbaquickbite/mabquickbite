<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — MBA Quick Bite</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    :root{--saffron:#FF6B00;--saffron-light:#FFF3E8;--saffron-dark:#CC5500;--green:#2E7D32;--green-light:#E8F5E9;--red:#C62828;--red-light:#FFEBEE;--text:#1A1A1A;--text-muted:#666;--bg:#FAFAF8;--white:#FFFFFF;--border:#EDEDE8;--card-shadow:0 2px 12px rgba(0,0,0,0.08);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:var(--saffron);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(255,107,0,0.3);}
    .header-back{color:white;font-size:22px;text-decoration:none;line-height:1;}
    .header-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:white;flex:1;}
    .cart-btn{position:relative;background:white;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
    .cart-count{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .sticky-bar{position:sticky;top:64px;z-index:90;background:var(--bg);padding:10px 16px 0;border-bottom:1px solid var(--border);}
    .search-wrap{position:relative;margin-bottom:10px;}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted);}
    .search-input{width:100%;padding:10px 12px 10px 38px;border:1.5px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;background:var(--white);outline:none;transition:border-color 0.2s;}
    .search-input:focus{border-color:var(--saffron);}
    .veg-toggle{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;user-select:none;}
    .veg-switch{width:38px;height:22px;background:#ccc;border-radius:11px;position:relative;transition:background 0.2s;}
    .veg-switch.on{background:var(--green);}
    .veg-switch::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;left:3px;transition:left 0.2s;}
    .veg-switch.on::after{left:19px;}
    .cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
    .cat-scroll::-webkit-scrollbar{display:none;}
    .cat-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .cat-chip.active{background:var(--saffron);border-color:var(--saffron);color:white;}
    .menu-wrap{padding:16px;}
    .section-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--text);margin:20px 0 12px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:2px;background:var(--border);border-radius:2px;}
    .item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    @media(min-width:480px){.item-grid{grid-template-columns:repeat(3,1fr);}}
    .item-card{background:var(--white);border-radius:16px;box-shadow:var(--card-shadow);overflow:hidden;display:flex;flex-direction:column;animation:fadeUp 0.3s ease both;transition:transform 0.2s;}
    .item-card:hover{transform:translateY(-2px);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .item-img-wrap{width:100%;aspect-ratio:1;background:var(--saffron-light);position:relative;overflow:hidden;}
    .item-img{width:100%;height:100%;object-fit:cover;display:block;}
    .item-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;}
    .veg-dot{position:absolute;top:6px;left:6px;width:14px;height:14px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;}
    .veg-dot.veg{border-color:var(--green);background:white;}
    .veg-dot.veg::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);}
    .veg-dot.nonveg{border-color:var(--red);background:white;}
    .veg-dot.nonveg::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);}
    .item-info{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .item-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
    .item-price{font-size:13px;font-weight:800;color:var(--saffron-dark);}
    .item-price-half{font-size:10px;color:var(--text-muted);font-weight:600;}
    .roman-offer-row,.roman-badge,.claim-btn,.price-strike{display:none;}
    .add-btn-wrap{margin-top:auto;}
    .add-btn{width:100%;padding:7px 0;background:var(--saffron-light);color:var(--saffron);border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:background 0.15s;}
    .add-btn:hover{background:var(--saffron);color:white;}
    .qty-ctrl{width:100%;padding:5px 0;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--saffron);}
    .qty-btn{background:white;border:none;width:22px;height:22px;border-radius:50%;font-size:14px;font-weight:700;color:var(--saffron);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .qty-num{color:white;font-size:13px;font-weight:800;min-width:20px;text-align:center;}
    .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--saffron);color:white;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;cursor:pointer;transform:translateY(100%);transition:transform 0.3s ease;z-index:200;box-shadow:0 -4px 20px rgba(255,107,0,0.3);}
    .cart-bar.visible{transform:translateY(0);}
    .cart-bar-items{font-size:11px;font-weight:600;opacity:0.85;}
    .skeleton-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .skeleton-card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:var(--card-shadow);}
    .skeleton-img{width:100%;aspect-ratio:1;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
    .skeleton-txt{padding:10px;display:flex;flex-direction:column;gap:6px;}
    .skeleton-line{height:10px;border-radius:5px;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-state .emoji{font-size:48px;margin-bottom:12px;}
    .empty-state p{font-size:15px;font-weight:600;}
    .pb-cart{height:72px;}
  </style>
</head>
<body>
<div class="header">
  <a href="index.html" class="header-back">←</a>
  <div class="header-title">🍽️ Our Menu</div>
  <button class="cart-btn" onclick="goToCart()">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></button>
</div>
<div class="sticky-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search 'Biryani', 'Paneer'..." oninput="applyFilters()"/>
  </div>
  <div class="veg-toggle" onclick="toggleVeg()">
    <div class="veg-switch" id="vegSwitch"></div>Veg only
  </div>
  <div class="cat-scroll" id="catScroll"></div>
</div>
<div class="menu-wrap" id="menuWrap">
  <div class="skeleton-grid" id="skeleton">
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-txt"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-txt"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-txt"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-txt"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
  </div>
</div>
<div class="pb-cart"></div>
<div class="cart-bar" id="cartBar" onclick="goToCart()">
  <div><span id="cartBarItems" class="cart-bar-items">0 items</span><div>View Cart</div></div>
  <div id="cartBarTotal">₹0 →</div>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyAyOVaQGQKqt0yqJssQZ6t-E7qrA24yooo",authDomain:"mba-foods-mithila.firebaseapp.com",projectId:"mba-foods-mithila",storageBucket:"mba-foods-mithila.firebasestorage.app",messagingSenderId:"1056157932148",appId:"1:1056157932148:web:5c2d044583f18c54e0cf21"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
</script>
<script>
let allItems=[],cart=JSON.parse(localStorage.getItem('mba_cart')||'{}'),vegOnly=false,activeCategory='All';
const CE={'Drinks':'☕','Shake':'🥤','Snacks':'🍟','Pizza':'🍕','Noodles':'🍜','Burger':'🍔','Roll':'🌯','Momos':'🥟','Soup':'🍵','Mutton':'🍖','Chicken':'🍗','Paneer':'🧀','Biryani':'🍛','Rice':'🍚','Thali':'🍽️'};
async function loadMenu(){const snap=await db.collection('menuItems').where('available','==',true).get();allItems=snap.docs.map(d=>({id:d.id,...d.data()}));buildCategoryBar();applyFilters();document.getElementById('skeleton').style.display='none';}
function buildCategoryBar(){const cats=['All',...new Set(allItems.map(i=>i.category))];document.getElementById('catScroll').innerHTML=cats.map(c=>`<div class="cat-chip${c==='All'?' active':''}" onclick="setCategory('${c}')">${CE[c]||'🍴'} ${c}</div>`).join('');}
function setCategory(cat){activeCategory=cat;document.querySelectorAll('.cat-chip').forEach(el=>el.classList.toggle('active',el.textContent.includes(cat==='All'?'All':cat)));applyFilters();}
function toggleVeg(){vegOnly=!vegOnly;document.getElementById('vegSwitch').classList.toggle('on',vegOnly);applyFilters();}
function applyFilters(){const q=document.getElementById('searchInput').value.toLowerCase().trim();let filtered=allItems.filter(item=>{if(vegOnly&&!item.isVeg)return false;if(activeCategory!=='All'&&item.category!==activeCategory)return false;if(q&&!item.name.toLowerCase().includes(q)&&!item.category.toLowerCase().includes(q))return false;return true;});const wrap=document.getElementById('menuWrap');if(!filtered.length){wrap.innerHTML='<div class="empty-state"><div class="emoji">🔍</div><p>Koi item nahi mila</p></div>';return;}const grouped={};filtered.forEach(item=>{if(!grouped[item.category])grouped[item.category]=[];grouped[item.category].push(item);});wrap.innerHTML=Object.entries(grouped).map(([cat,items],gi)=>`<div class="section-title">${CE[cat]||'🍴'} ${cat}</div><div class="item-grid">${items.map((item,i)=>itemCard(item,gi*10+i)).join('')}</div>`).join('')+'<div class="pb-cart"></div>';}
function itemCard(item,delay){const qty=cart[item.id]||0;const emoji=CE[item.category]||'🍴';const halfPrice=item.priceHalf?`<div class="item-price-half">Half: ₹${item.priceHalf}</div>`:'';return`<div class="item-card" style="animation-delay:${Math.min(delay*40,400)}ms"><div class="item-img-wrap">${item.image?`<img class="item-img" src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="item-img-placeholder" style="display:none">${emoji}</div>`:`<div class="item-img-placeholder">${emoji}</div>`}<div class="veg-dot ${item.isVeg?'veg':'nonveg'}"></div></div><div class="item-info"><div class="item-name">${item.name}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;"><div class="item-price">₹${item.price}</div><div style="display:flex;gap:5px;"><a href="tel:+919199606233" style="background:#E8F5E9;color:#2E7D32;border:none;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;text-decoration:none;">📞 Call</a><button onclick="addItem('${item.id}')" style="background:var(--saffron);color:white;border:none;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;">🛒 Order</button></div></div>${halfPrice}</div><div class="add-btn-wrap" id="ctrl_${item.id}">${qty===0?`<button class="add-btn" onclick="addItem('${item.id}')">+ ADD</button>`:`<div class="qty-ctrl"><button class="qty-btn" onclick="removeItem('${item.id}')">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="addItem('${item.id}')">+</button></div>`}</div></div>`;}
function addItem(id){cart[id]=(cart[id]||0)+1;saveCart();refreshCtrl(id);updateCartUI();}
function removeItem(id){if(!cart[id])return;cart[id]--;if(cart[id]===0)delete cart[id];saveCart();refreshCtrl(id);updateCartUI();}
function refreshCtrl(id){const el=document.getElementById('ctrl_'+id);if(!el)return;const qty=cart[id]||0;el.innerHTML=qty===0?`<button class="add-btn" onclick="addItem('${id}')">+ ADD</button>`:`<div class="qty-ctrl"><button class="qty-btn" onclick="removeItem('${id}')">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="addItem('${id}')">+</button></div>`;}
function saveCart(){localStorage.setItem('mba_cart',JSON.stringify(cart));localStorage.setItem('mba_cart_items',JSON.stringify(allItems.filter(i=>cart[i.id]).map(i=>({id:i.id,name:i.name,price:i.price,qty:cart[i.id],isVeg:i.isVeg,category:i.category,emoji:CE[i.category]||'🍴'}))));}
function updateCartUI(){const totalQty=Object.values(cart).reduce((a,b)=>a+b,0);const totalAmt=allItems.filter(i=>cart[i.id]).reduce((sum,i)=>sum+i.price*(cart[i.id]||0),0);const countEl=document.getElementById('cartCount');countEl.textContent=totalQty;countEl.style.display=totalQty>0?'flex':'none';const bar=document.getElementById('cartBar');if(totalQty>0){bar.classList.add('visible');document.getElementById('cartBarItems').textContent=`${totalQty} item${totalQty>1?'s':''} added`;document.getElementById('cartBarTotal').textContent=`₹${totalAmt} →`;}else{bar.classList.remove('visible');}}
function goToCart(){window.location.href='cart.html';}
loadMenu();updateCartUI();
</script>
</body>
</html>
